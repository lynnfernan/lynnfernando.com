# Personal Brand — Weekly Growth Loop (cloud replacement for the Monday local
# cron). Builds next week's calendar, drafts copy, renders on-brand IG graphics,
# and schedules to Buffer (LinkedIn + Instagram). Commits the generated calendar/
# drafts/digests back so state persists.
#
# Required secrets (github.com/lynnfernan/lynnfernando.com → Settings → Secrets):
#   BUFFER_ACCESS_TOKEN
#   BUFFER_LINKEDIN_PROFILE_ID, BUFFER_INSTAGRAM_PROFILE_ID  (personal LI + IG)
#   GMAIL_ADDRESS, GMAIL_APP_PASSWORD                        (digest email)
name: PB Growth Loop (weekly)

on:
  schedule:
    # Mondays ~7:30am PT (14:30 UTC during PDT).
    - cron: '30 14 * * 1'
  workflow_dispatch:
    inputs:
      no_buffer:
        description: 'Skip Buffer scheduling (generate + email only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  growth:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout PB repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install brand fonts (Georgia/Arial substitutes for headless canvas)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu fonts-liberation

      - name: Install growth-loop dependencies
        working-directory: agents/personal-brand-growth
        run: npm install --no-audit --no-fund

      - name: Run growth loop
        working-directory: agents/personal-brand-growth
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_LINKEDIN_PROFILE_ID: ${{ secrets.BUFFER_LINKEDIN_PROFILE_ID }}
          BUFFER_INSTAGRAM_PROFILE_ID: ${{ secrets.BUFFER_INSTAGRAM_PROFILE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.no_buffer }}" = "true" ]; then FLAGS="--no-buffer"; fi
          node personalBrandGrowthLoop.cjs $FLAGS

      - name: Commit generated calendar + drafts back to repo
        if: always()
        run: |
          git config user.name "Personal Brand Agent"
          git config user.email "lynn@lynnfernando.com"
          git add agents/personal-brand-growth/data/ agents/personal-brand-growth/drafts/ agents/personal-brand-growth/digests/ agents/personal-brand-growth/output/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated content to commit."
          else
            git commit -m "pb-growth: weekly calendar + drafts [skip ci]"
            git push
          fi
